<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Prospero Capital - Selecciona tu País</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --jade-dark: #0d3b2e;
            --jade-primary: #1a5f4a;
            --jade-medium: #2d8a6b;
            --jade-light: #4db88a;
            --jade-pale: #7dd4a8;
            --white: #ffffff;
            --off-white: #f8faf9;
            --gray-100: #f0f4f2;
            --gray-200: #d1dcd6;
            --gray-600: #5a7369;
            --gray-800: #2d4a40;
            --gold: #c9a227;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--jade-dark) 0%, var(--jade-primary) 50%, var(--jade-medium) 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 1rem;
            overflow-x: hidden;
        }

        /* Background Image */
        .bg-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('./images/hero-bg.jpg') center/cover;
            opacity: 0.3;
            z-index: 0;
        }

        /* Particle background */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 1;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            animation: float 15s infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) rotate(720deg);
                opacity: 0;
            }
        }

        /* Noise overlay */
        .noise-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.03;
            z-index: 1;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        .container {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 1.5rem 1rem;
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
        }

        .logo {
            margin-bottom: 2rem;
        }

        .logo-icon {
            width: min(90px, 20vw);
            height: min(90px, 20vw);
            background: linear-gradient(135deg, var(--white) 0%, var(--jade-pale) 100%);
            border-radius: min(24px, 5vw);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            box-shadow: 0 20px 60px rgba(26, 95, 74, 0.4);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                box-shadow: 0 20px 60px rgba(26, 95, 74, 0.4);
            }
            50% {
                transform: scale(1.05);
                box-shadow: 0 25px 70px rgba(26, 95, 74, 0.6);
            }
        }

        .logo-icon svg {
            width: 55%;
            height: 55%;
            color: var(--jade-primary);
        }

        h1 {
            font-size: clamp(2rem, 8vw, 4rem);
            font-weight: 800;
            color: var(--white);
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            line-height: 1.2;
            padding: 0 0.5rem;
        }

        .subtitle {
            font-size: clamp(1rem, 4vw, 1.4rem);
            color: rgba(255, 255, 255, 0.85);
            margin-bottom: 0.75rem;
            font-weight: 300;
        }

        .domain {
            font-size: clamp(0.75rem, 3vw, 1rem);
            color: var(--jade-pale);
            margin-bottom: 3rem;
            font-weight: 500;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            word-break: break-word;
            padding: 0 0.5rem;
        }

        .flags-container {
            display: flex;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
            margin: 0 auto;
            max-width: 100%;
        }

        .flag-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 24px;
            padding: 2rem 1.5rem;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            min-width: 180px;
            flex: 0 1 auto;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .flag-card:hover {
            background: var(--white);
            border-color: var(--jade-light);
            transform: translateY(-12px) scale(1.03);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
        }

        /* Active/Tap state for mobile */
        .flag-card:active {
            transform: scale(0.98);
            background: var(--white);
            border-color: var(--jade-light);
        }

        .flag {
            width: 120px;
            height: 80px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
            transition: transform 0.3s ease;
        }

        .flag-card:hover .flag {
            transform: scale(1.08);
        }

        .flag img, .flag svg {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .flag-name {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--jade-dark);
        }

        .flag-language {
            font-size: 0.875rem;
            color: var(--jade-medium);
            font-weight: 500;
        }

        .footer {
            position: relative;
            bottom: 0;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 2;
            margin-top: 3rem;
            padding: 1rem;
        }

        .footer p {
            color: rgba(255, 255, 255, 0.6);
            font-size: clamp(0.75rem, 3vw, 0.875rem);
        }

        /* Media Queries para móviles */
        @media (max-width: 768px) {
            body {
                padding: 0.5rem;
                justify-content: flex-start;
                min-height: 100vh;
                overflow-y: auto;
            }

            .container {
                padding: 1rem 0.5rem;
            }

            .logo {
                margin-bottom: 1.5rem;
            }

            .logo-icon {
                width: min(70px, 18vw);
                height: min(70px, 18vw);
                margin-bottom: 1rem;
            }

            h1 {
                font-size: clamp(1.8rem, 7vw, 2.5rem);
                margin-bottom: 0.25rem;
            }

            .subtitle {
                font-size: clamp(0.9rem, 3.5vw, 1.2rem);
                margin-bottom: 0.5rem;
            }

            .domain {
                font-size: clamp(0.7rem, 2.5vw, 0.9rem);
                margin-bottom: 2rem;
                letter-spacing: 0.1em;
            }

            .flags-container {
                gap: 1rem;
                flex-direction: column;
                align-items: center;
                width: 100%;
                max-width: 400px;
                margin: 0 auto;
            }

            .flag-card {
                width: 100%;
                max-width: 280px;
                padding: 1.5rem 1rem;
                min-width: unset;
                flex-direction: row;
                justify-content: flex-start;
                gap: 1rem;
                border-radius: 20px;
            }

            .flag {
                width: 70px;
                height: 47px;
                min-width: 70px;
                border-radius: 8px;
            }

            .flag-info {
                display: flex;
                flex-direction: column;
                align-items: flex-start;
                gap: 0.25rem;
            }

            .flag-name {
                font-size: 1.1rem;
            }

            .flag-language {
                font-size: 0.8rem;
            }

            .footer {
                margin-top: 2rem;
                position: relative;
                padding: 0.5rem;
            }
        }

        /* Pantallas muy pequeñas */
        @media (max-width: 360px) {
            .flag-card {
                max-width: 240px;
                padding: 1rem;
            }

            .flag {
                width: 60px;
                height: 40px;
                min-width: 60px;
            }

            .flag-name {
                font-size: 1rem;
            }
        }

        /* Orientación landscape en móviles */
        @media (max-height: 600px) and (orientation: landscape) {
            body {
                justify-content: center;
            }

            .container {
                padding: 0.5rem;
            }

            .logo-icon {
                width: 50px;
                height: 50px;
                margin-bottom: 0.5rem;
            }

            h1 {
                font-size: 1.8rem;
                margin-bottom: 0.1rem;
            }

            .subtitle {
                font-size: 0.9rem;
                margin-bottom: 0.2rem;
            }

            .domain {
                margin-bottom: 1rem;
                font-size: 0.7rem;
            }

            .flags-container {
                flex-direction: row;
                gap: 1rem;
            }

            .flag-card {
                width: auto;
                min-width: 140px;
                padding: 1rem;
            }
        }

        /* Ajustes para tablets */
        @media (min-width: 769px) and (max-width: 1024px) {
            .flags-container {
                gap: 1.5rem;
            }

            .flag-card {
                min-width: 160px;
                padding: 1.5rem;
            }

            .flag {
                width: 100px;
                height: 67px;
            }
        }

        /* Soporte para hover solo en dispositivos que lo soportan */
        @media (hover: hover) {
            .flag-card:hover {
                background: var(--white);
                border-color: var(--jade-light);
                transform: translateY(-12px) scale(1.03);
                box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
            }
        }
    </style>
</head>
<body>
    <div class="bg-image"></div>
    <div class="particles" id="particles"></div>
    <div class="noise-overlay"></div>

    <div class="container">
        <div class="logo">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                    <path d="M2 17l10 5 10-5"/>
                    <path d="M2 12l10 5 10-5"/>
                </svg>
            </div>
            <h1>Prospero Capital</h1>
            <p class="subtitle">Grupo Empresarial</p>
            <p class="domain">www.prosperocapitall.com</p>
        </div>

        <div class="flags-container">
            <a href="./us/" class="flag-card">
                <div class="flag">
                    <svg viewBox="0 0 190 100" xmlns="http://www.w3.org/2000/svg">
                        <rect width="190" height="100" fill="#B22234"/>
                        <rect y="7.69" width="190" height="7.69" fill="white"/>
                        <rect y="23.08" width="190" height="7.69" fill="white"/>
                        <rect y="38.46" width="190" height="7.69" fill="white"/>
                        <rect y="53.85" width="190" height="7.69" fill="white"/>
                        <rect y="69.23" width="190" height="7.69" fill="white"/>
                        <rect y="84.62" width="190" height="7.69" fill="white"/>
                        <rect width="76" height="53.85" fill="#3C3B6E"/>
                    </svg>
                </div>
                <div class="flag-info">
                        <span class="flag-name">Estados Unidos</span>
                    <span class="flag-language">Español</span>
                </div>
            </a>

            <a href="./co/" class="flag-card">
                <div class="flag">
                    <svg viewBox="0 0 150 100" xmlns="http://www.w3.org/2000/svg">
                        <rect width="150" height="50" fill="#FCD116"/>
                        <rect y="50" width="150" height="25" fill="#003893"/>
                        <rect y="75" width="150" height="25" fill="#CE1126"/>
                    </svg>
                </div>
                <div class="flag-info">
                    <span class="flag-name">Colombia</span>
                    <span class="flag-language">Español</span>
                </div>
            </a>

            <a href="./gt/" class="flag-card">
                <div class="flag">
                    <svg viewBox="0 0 160 100" xmlns="http://www.w3.org/2000/svg">
                        <rect width="160" height="100" fill="#4997D0"/>
                        <rect x="53.33" width="53.33" height="100" fill="white"/>
                    </svg>
                </div>
                <div class="flag-info">
                    <span class="flag-name">Guatemala</span>
                    <span class="flag-language">Español</span>
                </div>
            </a>
        </div>
    </div>

    <div class="footer">
        <p>&copy; 2026 Prospero Capital. Todos los derechos reservados.</p>
    </div>

    <script>
        // Create floating particles
        const particlesContainer = document.getElementById('particles');
        const particleCount = 30; // Reducido para mejor rendimiento en móviles

        for (let i = 0; i < particleCount; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 15 + 's';
            particle.style.animationDuration = (10 + Math.random() * 10) + 's';
            
            // Partículas más pequeñas en móviles
            if (window.innerWidth <= 768) {
                particle.style.width = '2px';
                particle.style.height = '2px';
            }
            
            particlesContainer.appendChild(particle);
        }

        // Ajustar partículas al cambiar tamaño de pantalla
        window.addEventListener('resize', function() {
            const particles = document.querySelectorAll('.particle');
            if (window.innerWidth <= 768) {
                particles.forEach(p => {
                    p.style.width = '2px';
                    p.style.height = '2px';
                });
            } else {
                particles.forEach(p => {
                    p.style.width = '4px';
                    p.style.height = '4px';
                });
            }
        });
    </script>
</body>
</html>
